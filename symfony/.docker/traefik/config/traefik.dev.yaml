
entryPoints:
    web:
        address: ":80"

api:
    dashboard: true
    insecure: true  # OK en dev

providers:
    docker:
        endpoint: "unix:///var/run/docker.sock"
        exposedByDefault: false
        watch: true

    file:
        directory: /etc/traefik/dynamic
        watch: true

log:
    level: DEBUG

accessLog:
    format: common
