
entryPoints:
    web:
        address: ":80"
        http:
            redirections:
                entryPoint:
                    to: websecure
                    scheme: https

    websecure:
        address: ":443"

api:
    dashboard: true
    insecure: false

providers:
    docker:
        endpoint: "unix:///var/run/docker.sock"
        exposedByDefault: false
        watch: true

    file:
        directory: /etc/traefik/dynamic
        watch: true

certificatesResolvers:
    letsencrypt:
        acme:
            email: my@email.com
            storage: /letsencrypt/acme.json
            httpChallenge:
                entryPoint: web

log:
    level: WARN

accessLog:
    format: json
